<!DOCTYPE html>
<html lang="zh-CN" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>美发工具使用习惯调研</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Sans:wght@300;400;500&family=Noto+Sans+Arabic:wght@300;400;500&family=Noto+Serif:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1a2e; --mist: #f4f2ee; --stone: #e8e4dc;
  --sage: #7a9e87; --sage-l: #eef4f0; --clay: #c4845a; --clay-l: #fdf0e8;
  --line: #d4cfc7; --text-s: #6b6560; --r: 14px;
}
html, body { background: var(--mist); color: var(--ink); min-height: 100vh;
  font-family: 'Noto Sans SC', 'Noto Sans', sans-serif; font-weight: 300;
  -webkit-font-smoothing: antialiased; }

/* RTL global */
[dir="rtl"] { font-family: 'Noto Sans Arabic', 'Noto Sans', sans-serif; }
[dir="rtl"] .opt-mark { margin-right: 0; margin-left: 12px; }
[dir="rtl"] .rank-badge { margin-left: 0; margin-right: 8px; }
[dir="rtl"] .s-divider { border-left: none; border-right: 2.5px solid var(--sage); padding: 0 14px 0 0; }
[dir="rtl"] .c-num { margin-left: 10px; margin-right: 0; }
[dir="rtl"] .grid-table th:first-child { text-align: right; padding-right: 20px; padding-left: 6px; }
[dir="rtl"] .grid-table td:first-child { text-align: right; padding-right: 20px; padding-left: 6px; }
[dir="rtl"] .lang-btn { font-family: 'Noto Sans Arabic', sans-serif; }

/* ── Language switcher ── */
.lang-bar {
  position: fixed; top: 3px; right: 12px; z-index: 200;
  display: flex; gap: 4px; padding: 5px 0;
}
[dir="rtl"] .lang-bar { right: auto; left: 12px; }
.lang-btn {
  padding: 4px 9px; border-radius: 20px; border: 1px solid var(--line);
  background: rgba(244,242,238,.88); backdrop-filter: blur(8px);
  font-size: 11px; font-weight: 500; color: var(--text-s);
  cursor: pointer; transition: all .18s; letter-spacing: .02em;
  -webkit-tap-highlight-color: transparent;
}
.lang-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.lang-btn:active { transform: scale(.94); }

/* ── Progress bar ── */
#prog-wrap { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 3px; background: var(--stone); }
#prog-bar { height: 100%; background: var(--sage); transition: width .5s cubic-bezier(.4,0,.2,1); width: 0%; }

/* ── Cover ── */
.site-header { padding: 56px 28px 0; text-align: center; }
.site-header .eyebrow { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--sage); margin-bottom: 12px; }
[dir="rtl"] .site-header .eyebrow { letter-spacing: .04em; }
.site-header h1 { font-family: 'Noto Serif SC', 'Noto Serif', serif; font-size: 26px; font-weight: 600; line-height: 1.35; color: var(--ink); margin-bottom: 14px; }
[dir="rtl"] .site-header h1 { font-family: 'Noto Sans Arabic', sans-serif; font-size: 24px; }
.site-header p { font-size: 13px; color: var(--text-s); line-height: 1.7; max-width: 320px; margin: 0 auto 8px; }
.site-header .meta { font-size: 12px; color: #aaa; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line); }
.start-btn { display: block; width: calc(100% - 56px); margin: 28px auto 0;
  background: var(--ink); color: #fff; font-size: 15px; font-weight: 500;
  padding: 16px; border-radius: var(--r); border: none; cursor: pointer;
  letter-spacing: .04em; transition: opacity .2s, transform .15s;
  -webkit-tap-highlight-color: transparent; }
[dir="rtl"] .start-btn { letter-spacing: 0; font-family: 'Noto Sans Arabic', sans-serif; }
.start-btn:active { transform: scale(.97); opacity: .88; }

/* ── Survey ── */
#survey { display: none; padding-bottom: 60px; }
.q-card { margin: 20px 20px 0; background: #fff; border-radius: var(--r);
  box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden;
  opacity: 0; transform: translateY(18px); transition: opacity .4s ease, transform .4s ease; }
.q-card.visible { opacity: 1; transform: translateY(0); }
.q-head { padding: 20px 20px 14px; border-bottom: 1px solid var(--stone); }
.q-num { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--sage); font-weight: 500; margin-bottom: 8px; }
[dir="rtl"] .q-num { letter-spacing: .02em; font-family: 'Noto Sans Arabic', sans-serif; }
.q-text { font-size: 15.5px; line-height: 1.6; font-weight: 400; color: var(--ink); }
.q-sub { font-size: 12px; color: var(--text-s); margin-top: 6px; line-height: 1.55; }
.q-body { padding: 8px 0; }

/* ── Options ── */
.opt { display: flex; align-items: center; padding: 13px 20px; cursor: pointer;
  border-bottom: 1px solid var(--stone); transition: background .15s;
  -webkit-tap-highlight-color: transparent; }
.opt:last-child { border-bottom: none; }
.opt:active { background: var(--mist); }
.opt.selected { background: var(--sage-l); }
.opt.selected .opt-mark { background: var(--sage); border-color: var(--sage); }
.opt.selected .opt-mark::after { opacity: 1; }
.opt-mark { flex-shrink: 0; width: 20px; height: 20px; border: 1.5px solid var(--line);
  border-radius: 50%; margin-right: 12px; position: relative; transition: all .2s; }
.opt-mark.square { border-radius: 5px; }
.opt-mark::after { content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%); width: 8px; height: 8px;
  background: #fff; border-radius: 50%; opacity: 0; transition: opacity .2s; }
.opt-mark.square::after { width: 10px; height: 8px; border-radius: 2px;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") center/contain no-repeat; }
.opt-label { font-size: 14.5px; color: var(--ink); line-height: 1.45; }
.opt.selected .opt-label { color: #2d6b4a; font-weight: 400; }

/* ── Scale ── */
.scale-wrap { padding: 16px 20px 20px; }
.scale-labels { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--text-s); margin-bottom: 14px; }
.scale-dots { display: flex; justify-content: space-between; }
.scale-dot { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--line);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  color: var(--text-s); cursor: pointer; transition: all .2s; -webkit-tap-highlight-color: transparent; }
.scale-dot:active { transform: scale(.92); }
.scale-dot.selected { background: var(--sage); border-color: var(--sage); color: #fff; font-weight: 500; box-shadow: 0 3px 8px rgba(122,158,135,.35); }

/* ── Open ── */
.open-wrap { padding: 12px 20px 20px; }
.open-wrap textarea { width: 100%; min-height: 88px; border: 1.5px solid var(--line);
  border-radius: 10px; padding: 12px 14px; resize: none; outline: none;
  font-family: inherit; font-size: 14px; font-weight: 300; color: var(--ink);
  background: var(--mist); line-height: 1.6; transition: border-color .2s; direction: inherit; }
.open-wrap textarea:focus { border-color: var(--sage); background: #fff; }
.open-wrap textarea::placeholder { color: #bbb; }

/* ── Rank ── */
.rank-wrap { padding: 8px 0 4px; }
.rank-item { display: flex; align-items: center; padding: 11px 20px;
  border-bottom: 1px solid var(--stone); -webkit-tap-highlight-color: transparent; }
.rank-item:last-child { border-bottom: none; }
.rank-label { font-size: 13.5px; color: var(--ink); line-height: 1.45; flex: 1; }
.rank-badge { width: 22px; height: 22px; border-radius: 6px; background: var(--clay);
  color: #fff; font-size: 12px; font-weight: 500; display: none; align-items: center;
  justify-content: center; flex-shrink: 0; margin-left: 8px; }
.rank-badge.show { display: flex; }

/* ── Grid ── */
.grid-wrap { padding: 0 0 8px; overflow-x: auto; }
.grid-table { width: 100%; border-collapse: collapse; }
.grid-table th { font-size: 11px; color: var(--text-s); font-weight: 400; padding: 10px 6px;
  text-align: center; border-bottom: 1px solid var(--stone); white-space: nowrap; }
.grid-table th:first-child { text-align: left; padding-left: 20px; width: 38%; }
.grid-table td { padding: 10px 6px; text-align: center; border-bottom: 1px solid var(--stone); font-size: 12.5px; }
.grid-table tr:last-child td { border-bottom: none; }
.grid-table td:first-child { text-align: left; padding-left: 20px; color: var(--ink); font-size: 13px; }
.grid-dot { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--line);
  margin: 0 auto; cursor: pointer; transition: all .2s; -webkit-tap-highlight-color: transparent; }
.grid-dot.selected { background: var(--sage); border-color: var(--sage); }

/* ── Nav ── */
.nav-bar { position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
  background: rgba(244,242,238,.92); backdrop-filter: blur(12px);
  border-top: 1px solid var(--line); display: flex; gap: 10px; z-index: 99; }
.nav-bar.hidden { display: none; }
.btn-prev { flex: 0 0 80px; height: 44px; border-radius: 12px; border: 1.5px solid var(--line);
  background: transparent; color: var(--text-s); font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer; letter-spacing: .02em;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  -webkit-tap-highlight-color: transparent; transition: all .2s; }
.btn-prev:hover { background: var(--stone); }
.btn-prev:active { transform: scale(.96); }
.btn-prev:disabled { opacity: .28; pointer-events: none; }
.btn-next { flex: 1; height: 44px; border-radius: 12px; background: var(--ink); color: #fff;
  font-family: inherit; font-size: 14.5px; font-weight: 500; border: none; cursor: pointer;
  letter-spacing: .04em; -webkit-tap-highlight-color: transparent; transition: opacity .2s, transform .15s; }
[dir="rtl"] .btn-next { letter-spacing: 0; }
.btn-next:active { transform: scale(.97); }
.btn-next:disabled { opacity: .35; }
.btn-next.highlight { background: var(--sage); }

.step-info { text-align: center; font-size: 11px; color: #bbb; padding: 14px 20px 0; letter-spacing: .05em; }
[dir="rtl"] .step-info { letter-spacing: 0; }
.s-divider { margin: 24px 20px 0; padding: 0 0 0 14px; border-left: 2.5px solid var(--sage); }
.s-divider span { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--sage); font-weight: 500; }
[dir="rtl"] .s-divider span { letter-spacing: .02em; }

/* ── Concept ── */
.concept-card { margin: 20px 20px 0; padding: 20px; background: var(--sage-l);
  border-radius: var(--r); border: 1px solid #c5dac9;
  opacity: 0; transform: translateY(18px); transition: opacity .4s ease, transform .4s ease; }
.concept-card.visible { opacity: 1; transform: translateY(0); }
.concept-card .c-title { font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--sage); font-weight: 500; margin-bottom: 14px; }
[dir="rtl"] .concept-card .c-title { letter-spacing: .02em; }
.concept-card .c-item { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13.5px; line-height: 1.55; color: var(--ink); }
.concept-card .c-item:last-child { margin-bottom: 0; }
.concept-card .c-num { flex-shrink: 0; width: 20px; height: 20px; background: var(--sage);
  color: #fff; border-radius: 50%; font-size: 11px; font-weight: 500;
  display: flex; align-items: center; justify-content: center; margin-top: 1px; }

/* ── End / Disq ── */
#end-screen { display: none; padding: 60px 28px 40px; text-align: center; animation: fadeUp .5s ease both; }
.end-icon { font-size: 52px; margin-bottom: 20px; }
#end-screen h2 { font-family: 'Noto Serif SC','Noto Serif',serif; font-size: 22px; color: var(--ink); margin-bottom: 12px; }
[dir="rtl"] #end-screen h2 { font-family: 'Noto Sans Arabic', sans-serif; }
#end-screen p { font-size: 13.5px; color: var(--text-s); line-height: 1.7; }
.end-summary { margin-top: 28px; padding: 16px; background: #fff; border-radius: var(--r);
  text-align: left; font-size: 13px; color: var(--text-s); border: 1px solid var(--stone); }
[dir="rtl"] .end-summary { text-align: right; }
.end-summary p { margin-bottom: 4px; }
.end-summary span { color: var(--ink); font-weight: 400; }
#disq-screen { display: none; padding: 80px 28px; text-align: center; }
#disq-screen h2 { font-family: 'Noto Serif SC','Noto Serif',serif; font-size: 20px; margin-bottom: 12px; }
[dir="rtl"] #disq-screen h2 { font-family: 'Noto Sans Arabic', sans-serif; }
#disq-screen p { font-size: 13px; color: var(--text-s); line-height: 1.7; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="prog-wrap"><div id="prog-bar"></div></div>

<!-- Language Switcher -->
<div class="lang-bar" id="lang-bar">
  <button class="lang-btn active" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('ar')">عربي</button>
  <button class="lang-btn" onclick="setLang('ru')">РУС</button>
</div>

<!-- Cover -->
<div id="cover">
  <div class="site-header">
    <div class="eyebrow" data-i18n="eyebrow"></div>
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle1"></p>
    <p data-i18n="subtitle2"></p>
    <div class="meta" data-i18n="meta"></div>
  </div>
  <button class="start-btn" onclick="startSurvey()" data-i18n="start"></button>
</div>

<div id="disq-screen">
  <div style="font-size:40px;margin-bottom:16px">🙏</div>
  <h2 data-i18n="disq_title"></h2>
  <p data-i18n="disq_body"></p>
</div>

<div id="survey">
  <div class="step-info" id="step-info"></div>
  <div id="q-container"></div>
  <div style="height:80px"></div>
</div>

<div class="nav-bar hidden" id="nav-bar">
  <button class="btn-prev" id="btn-prev" onclick="goPrev()"><span id="prev-arrow">←</span> <span id="prev-label">上一题</span></button>
  <button class="btn-next" id="btn-next" onclick="goNext()"></button>
</div>

<div id="end-screen">
  <div class="end-icon">✨</div>
  <h2 data-i18n="end_title"></h2>
  <p data-i18n="end_body"></p>
  <div class="end-summary" id="summary-box"></div>
</div>

    concept_items:[

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let lang = 'zh';
let current = 0;
let answers = {};
let rankState = {};

function getLang() { return T[lang]; }
function getQ(idx) { return getLang().questions[idx]; }
const TOTAL = () => getLang().questions.length;

// ═══════════════════════════════════════════════
// LANGUAGE SWITCH
// ═══════════════════════════════════════════════
function setLang(l) {
  lang = l;
  const isRTL = (l === 'ar');
  document.documentElement.lang = l === 'zh' ? 'zh-CN' : l;
  document.documentElement.dir = isRTL ? 'rtl' : 'ltr';

  // font family
  const bodyFont = isRTL
    ? "'Noto Sans Arabic', sans-serif"
    : l === 'zh'
      ? "'Noto Sans SC', 'Noto Sans', sans-serif"
      : "'Noto Sans', sans-serif";
  document.body.style.fontFamily = bodyFont;

  // update lang buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === {zh:'中文',en:'EN',ar:'عربي',ru:'РУС'}[l]);
  });

  // update static text
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (getLang()[key] !== undefined) {
      el.textContent = getLang()[key];
    }
  });

  // RTL arrow fix
  document.getElementById('prev-arrow').textContent = isRTL ? '→' : '←';
  document.getElementById('prev-label').textContent = {
    zh:'上一题', en:'Back', ar:'السابق', ru:'Назад'
  }[l] || 'Back';

  // re-render current question if survey is active
  if (document.getElementById('survey').style.display !== 'none') {
    renderQuestion(current);
  }
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function startSurvey() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('survey').style.display = 'block';
  document.getElementById('nav-bar').classList.remove('hidden');
  renderQuestion(0);
}

function renderQuestion(idx) {
  const L = getLang();
  const q = L.questions[idx];
  const container = document.getElementById('q-container');
  container.innerHTML = '';

  if (L.dividers[idx]) {
    const d = document.createElement('div');
    d.className = 's-divider';
    d.innerHTML = `<span>${L.dividers[idx]}</span>`;
    container.appendChild(d);
  }

  // Concept card
  if (q.type === 'concept') {
    const cc = document.createElement('div');
    cc.className = 'concept-card';
    cc.innerHTML = `
      <div class="c-title">${L.concept_title}</div>
      ${L.concept_items.map(([t,d],i)=>`
        <div class="c-item">
          <div class="c-num">${i+1}</div>
          <div><strong>${t}</strong>：${d}</div>
        </div>`).join('')}`;
    container.appendChild(cc);
    setTimeout(() => cc.classList.add('visible'), 60);
    updateNav(idx);
    const btn = document.getElementById('btn-next');
    btn.textContent = L.read_on;
    btn.classList.add('highlight');
    btn.disabled = false;
    updateProgress(idx);
    updateStepInfo(idx);
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }

  const card = document.createElement('div');
  card.className = 'q-card';
  const displayNum = getDisplayNum(idx);
  let html = `
    <div class="q-head">
      <div class="q-num">${L.q_label} ${displayNum}</div>
      <div class="q-text">${q.text}</div>
      ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
    </div>
    <div class="q-body">`;

  if (q.type === 'single') {
    q.opts.forEach((o, i) => {
      const sel = answers[q.id] === i ? 'selected' : '';
      html += `<div class="opt ${sel}" onclick="selectSingle('${q.id}',${i},this)">
        <div class="opt-mark"></div><div class="opt-label">${o}</div></div>`;
    });
  }

  if (q.type === 'multi') {
    let lastGroup = -1;
    q.opts.forEach((o, i) => {
      // Insert group label if this question has groups
      if (q.groups && q.groups[i] !== lastGroup) {
        lastGroup = q.groups[i];
        const glabel = q.groupLabels ? q.groupLabels[lastGroup] : '';
        if (glabel) {
          html += `<div style="padding:8px 20px 4px;font-size:11px;font-weight:600;color:var(--sage);letter-spacing:.08em;text-transform:uppercase;border-top:1px solid var(--stone)">${glabel}</div>`;
        }
      }
      const sel = (answers[q.id] || []).includes(i) ? 'selected' : '';
      html += `<div class="opt ${sel}" onclick="selectMulti('${q.id}',${i},this,${q.max||99})">
        <div class="opt-mark square"></div><div class="opt-label">${o}</div></div>`;
    });
  }

  if (q.type === 'scale') {
    const cur = answers[q.id];
    html += `<div class="scale-wrap">
      <div class="scale-labels"><span>${q.left}</span><span>${q.right}</span></div>
      <div class="scale-dots">
        ${Array.from({length:q.points},(_,i)=>`
          <div class="scale-dot ${cur===i+1?'selected':''}" onclick="selectScale('${q.id}',${i+1},this)">${i+1}</div>
        `).join('')}
      </div></div>`;
  }

  if (q.type === 'open') {
    html += `<div class="open-wrap">
      <textarea id="ta_${q.id}" placeholder="${lang==='ar'?'اكتبي أفكارك هنا…':lang==='ru'?'Напишите ваши мысли здесь…':lang==='en'?'Write your thoughts here…':'在这里写下你的想法…'}"
        oninput="answers['${q.id}']=this.value">${answers[q.id]||''}</textarea></div>`;
  }

  if (q.type === 'rank') {
    if (!rankState[q.id]) rankState[q.id] = {};
    const rs = rankState[q.id];
    html += `<div class="rank-wrap">`;
    q.opts.forEach((o, i) => {
      const rank = rs[i] !== undefined ? rs[i] : null;
      html += `<div class="rank-item" id="ri_${q.id}_${i}">
        <div class="rank-label">${o}</div>
        <div class="rank-badge ${rank!==null?'show':''}" id="rb_${q.id}_${i}">${rank!==null?rank:''}</div>
      </div>`;
    });
    const usedRanks = Object.values(rs);
    html += `</div>
    <div style="padding:8px 20px 16px">
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;" id="rank-btns-${q.id}">
        ${q.opts.map((_,i)=>{
          const used = usedRanks.includes(i+1);
          return `<div style="width:36px;height:36px;border-radius:9px;border:1.5px solid ${used?'var(--clay)':'var(--line)'};
            background:${used?'var(--clay)':'transparent'};
            color:${used?'#fff':'var(--text-s)'};font-size:14px;font-weight:500;
            display:flex;align-items:center;justify-content:center;cursor:pointer;"
            onclick="assignRank('${q.id}',${i+1})">${i+1}</div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (q.type === 'grid') {
    const saved = answers[q.id] || {};
    html += `<div class="grid-wrap"><table class="grid-table">
      <thead><tr>
        <th></th>${q.cols.map(c=>`<th>${c}</th>`).join('')}
      </tr></thead><tbody>
      ${q.rows.map((r,ri)=>`<tr>
        <td>${r}</td>
        ${q.cols.map((c,ci)=>`<td><div class="grid-dot ${saved[ri]===ci?'selected':''}"
          onclick="selectGrid('${q.id}',${ri},${ci},this)"></div></td>`).join('')}
      </tr>`).join('')}
      </tbody></table></div>`;
  }

  html += `</div>`;
  card.innerHTML = html;
  container.appendChild(card);
  setTimeout(() => card.classList.add('visible'), 60);

  if (q.type === 'rank') setupRankClick(q.id, q.opts.length);

  updateNav(idx);
  updateProgress(idx);
  updateStepInfo(idx);
  window.scrollTo({top:0, behavior:'smooth'});
}

function getDisplayNum(idx) {
  let count = 0;
  const qs = getLang().questions;
  for (let i = 0; i <= idx; i++) {
    if (qs[i].type !== 'concept' && qs[i].id !== 'S1') count++;
  }
  return count;
}

// ═══════════════════════════════════════════════
// ANSWERS
// ═══════════════════════════════════════════════
function selectSingle(id, i, el) {
  answers[id] = i;
  el.closest('.q-body').querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  updateNextBtn();
  setTimeout(() => { if (canAdvance()) goNext(); }, 380);
}

function selectMulti(id, i, el, max) {
  if (!answers[id]) answers[id] = [];
  const arr = answers[id];
  const pos = arr.indexOf(i);
  if (pos >= 0) { arr.splice(pos,1); el.classList.remove('selected'); }
  else {
    if (arr.length >= max) { el.style.opacity='.45'; setTimeout(()=>el.style.opacity='',300); return; }
    arr.push(i); el.classList.add('selected');
  }
  updateNextBtn();
}

function selectScale(id, v, el) {
  answers[id] = v;
  el.closest('.scale-dots').querySelectorAll('.scale-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  updateNextBtn();
  setTimeout(() => { if(canAdvance()) goNext(); }, 400);
}

function selectGrid(id, row, col, el) {
  if (!answers[id]) answers[id] = {};
  answers[id][row] = col;
  el.closest('tr').querySelectorAll('.grid-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  updateNextBtn();
}

let pendingRank = {};
function assignRank(id, rankNum) {
  const rs = rankState[id];
  const existing = Object.entries(rs).find(([k,v]) => v === rankNum);
  if (existing) delete rs[existing[0]];
  pendingRank[id] = rankNum;
  answers[id] = {...rs};
  renderQuestion(current);
}

function setupRankClick(id, count) {
  for (let i = 0; i < count; i++) {
    const item = document.getElementById(`ri_${id}_${i}`);
    if (!item) continue;
    item.onclick = () => {
      const rs = rankState[id];
      const pending = pendingRank[id];
      if (pending === undefined) return;
      delete rs[i];
      rs[i] = pending;
      delete pendingRank[id];
      answers[id] = {...rs};
      renderQuestion(current);
    };
  }
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function canAdvance() {
  const q = getQ(current);
  if (!q.required) return true;
  if (q.type === 'concept') return true;
  if (q.type === 'single') return answers[q.id] !== undefined;
  if (q.type === 'multi') return (answers[q.id]||[]).length > 0;
  if (q.type === 'scale') return answers[q.id] !== undefined;
  if (q.type === 'grid') { const s=answers[q.id]||{}; return q.rows.every((_,i)=>s[i]!==undefined); }
  if (q.type === 'rank') return Object.keys(rankState[q.id]||{}).length > 0;
  return true;
}

function updateNextBtn() {
  const btn = document.getElementById('btn-next');
  if (!btn) return;
  const q = getQ(current);
  const L = getLang();
  btn.disabled = q.required && !canAdvance();
  btn.classList.remove('highlight');
  const isLast = current === TOTAL() - 1;
  if (isLast) { btn.textContent = L.submit; }
  else if (!q.required && !canAdvance()) { btn.textContent = L.skip; }
  else { btn.textContent = L.next; }
}

function updateNav(idx) {
  const btnPrev = document.getElementById('btn-prev');
  if (!btnPrev) return;
  btnPrev.disabled = idx === 0;
  // Keep prev label in sync with current language
  const prevLabel = document.getElementById('prev-label');
  const prevArrow = document.getElementById('prev-arrow');
  if (prevLabel) {
    const isRTL = document.documentElement.dir === 'rtl';
    prevLabel.textContent = {zh:'上一题',en:'Back',ar:'السابق',ru:'Назад'}[lang] || 'Back';
    if (prevArrow) prevArrow.textContent = isRTL ? '→' : '←';
  }
  updateNextBtn();
}

function checkShowIf(cond) {
  if (!cond) return true;
  const val = answers[cond.qid];
  return val !== undefined && cond.values.includes(val);
}

function goNext() {
  const q = getQ(current);
  if (q.disqualify && q.disqualify.includes(answers[q.id])) {
    document.getElementById('survey').style.display = 'none';
    document.getElementById('nav-bar').classList.add('hidden');
    document.getElementById('disq-screen').style.display = 'block';
    document.querySelector('#disq-screen h2').textContent = getLang().disq_title;
    document.querySelector('#disq-screen p').textContent = getLang().disq_body;
    return;
  }
  if (current === TOTAL() - 1) { submitSurvey(); return; }
  current++;
  // Skip questions whose showIf condition is not met
  while (current < TOTAL() - 1 && !checkShowIf(getQ(current).showIf)) {
    current++;
  }
  renderQuestion(current);
}

function goPrev() {
  if (current === 0) return;
  current--;
  // Skip back over questions whose showIf condition is not met
  while (current > 0 && !checkShowIf(getQ(current).showIf)) {
    current--;
  }
  renderQuestion(current);
}

function updateProgress(idx) {
  document.getElementById('prog-bar').style.width = Math.round((idx / TOTAL()) * 100) + '%';
}

function updateStepInfo(idx) {
  const L = getLang();
  const q = getQ(idx);
  const visibleTotal = L.questions.filter(q => q.type !== 'concept' && q.id !== 'S1').length;
  let count = 0;
  for (let i = 0; i <= idx; i++) {
    if (L.questions[i].type !== 'concept' && L.questions[i].id !== 'S1') count++;
  }
  const info = document.getElementById('step-info');
  if (info) info.textContent = q.type === 'concept' ? L.read_concept : `${count} ${L.of} ${visibleTotal}`;
}

// ═══════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════
async function submitSurvey() {
  const L = getLang();

  // Show submitting state
  const btnNext = document.getElementById('btn-next');
  if (btnNext) {
    btnNext.disabled = true;
    btnNext.textContent = {zh:'提交中…',en:'Submitting…',ar:'جارٍ الإرسال…',ru:'Отправка…'}[lang] || 'Submitting…';
  }

  // POST to backend
  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lang, answers })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
  } catch (err) {
    console.error('Submit failed:', err);
  }

  // Show end screen
  document.getElementById('survey').style.display = 'none';
  document.getElementById('nav-bar').classList.add('hidden');
  document.getElementById('prog-bar').style.width = '100%';

  const end = document.getElementById('end-screen');
  end.style.display = 'block';
  end.querySelector('h2').textContent = L.end_title;
  end.querySelector('p').textContent = L.end_body;

  const q19 = answers['Q19'];
  const q22 = answers['Q22'];
  const q24 = answers['Q24'];
  const q22text = q22 !== undefined ? L.questions.find(q=>q.id==='Q22').opts[q22] : '—';
  const q24text = q24 !== undefined ? L.questions.find(q=>q.id==='Q24').opts[q24] : '—';

  document.getElementById('summary-box').innerHTML = `
    <p>📍 <span>${L.end_interest}：${q19 ? q19 + ' / 5' : '—'}</span></p>
    <p>💰 <span>${L.end_price}：${q22text}</span></p>
    <p>🤝 <span>${L.end_followup}：${q24text}</span></p>
    <p style="margin-top:8px;font-size:11px;color:#bbb">${L.end_recorded}</p>`;

  window.scrollTo({top:0,behavior:'smooth'});
}

// Init
setLang('zh');
</script>
